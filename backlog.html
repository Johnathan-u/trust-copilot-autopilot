<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Copilot Autopilot — Backlog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg-root: #0e0e10;
  --bg-editor: #1a1a2e;
  --bg-sidebar: #12121a;
  --bg-card: #1e1e30;
  --bg-card-hover: #252540;
  --bg-input: #16162a;
  --bg-tooltip: #2a2a45;
  --border: #2a2a40;
  --border-active: #3d3d5c;
  --text-primary: #d4d4e8;
  --text-secondary: #8888aa;
  --text-muted: #555570;
  --py-keyword: #c586c0;
  --py-function: #dcdcaa;
  --py-string: #6a9955;
  --py-number: #b5cea8;
  --py-class: #4ec9b0;
  --py-param: #9cdcfe;
  --py-builtin: #569cd6;
  --py-decorator: #d7ba7d;
  --py-operator: #ce9178;
  --accent-blue: #264f78;
  --accent-blue-bright: #007acc;
  --accent-purple: #6b4c9a;
  --accent-green: #2ea043;
  --accent-green-dim: #1a3a2a;
  --accent-yellow: #d29922;
  --accent-red: #f85149;
  --accent-orange: #e3873a;
  --glow-blue: rgba(0, 122, 204, 0.15);
  --glow-purple: rgba(107, 76, 154, 0.15);
  --glow-green: rgba(46, 160, 67, 0.15);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 14px;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-root);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  padding: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
}

.sidebar-header .brand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--py-builtin), var(--py-keyword));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.global-progress {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.global-progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

.global-progress-bar {
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
}

.global-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--py-builtin), var(--py-keyword), var(--py-class));
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.global-progress-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.global-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}

.stat-box {
  background: var(--bg-input);
  border-radius: var(--radius);
  padding: 8px 10px;
  text-align: center;
}

.stat-box .stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--py-function);
}

.stat-box .stat-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.nav-list {
  flex: 1;
  padding: 8px 0;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 3px solid transparent;
  position: relative;
}

.nav-item:hover {
  background: var(--bg-card);
  border-left-color: var(--border-active);
}

.nav-item.active {
  background: var(--glow-blue);
  border-left-color: var(--accent-blue-bright);
}

.nav-item .nav-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--py-number);
  background: var(--bg-input);
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  flex-shrink: 0;
}

.nav-item .nav-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-item.active .nav-label { color: var(--text-primary); }

.nav-item .nav-progress {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

.nav-item .nav-check {
  color: var(--accent-green);
  font-size: 0.75rem;
  display: none;
}

.nav-item.complete .nav-check { display: inline; }
.nav-item.complete .nav-num { background: var(--accent-green-dim); color: var(--accent-green); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.sidebar-footer button {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  padding: 8px;
  background: var(--bg-input);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sidebar-footer button:hover {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border-active);
}

/* ── Main Content ── */
.main {
  padding: 0;
  overflow-y: auto;
  height: 100vh;
}

.main-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(14, 14, 16, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.main-header h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.main-header h2 span { color: var(--py-builtin); }

.state-machine {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}

.state-machine .state {
  color: var(--py-class);
  background: rgba(78, 201, 176, 0.08);
  padding: 2px 6px;
  border-radius: 3px;
}

.state-machine .arrow { color: var(--text-muted); }

.content {
  padding: 24px 32px 80px;
}

/* ── Increment Section ── */
.increment {
  margin-bottom: 32px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg-editor);
  transition: border-color var(--transition);
}

.increment:hover { border-color: var(--border-active); }
.increment.complete { border-color: var(--accent-green); }

.increment-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
  position: relative;
  overflow: hidden;
}

.increment-header:hover { background: var(--bg-card); }

.increment-header::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 0 2px 2px 0;
  transition: background var(--transition);
}

.increment[data-color="blue"] .increment-header::before { background: var(--py-builtin); }
.increment[data-color="purple"] .increment-header::before { background: var(--py-keyword); }
.increment[data-color="green"] .increment-header::before { background: var(--py-string); }
.increment[data-color="teal"] .increment-header::before { background: var(--py-class); }
.increment[data-color="gold"] .increment-header::before { background: var(--py-function); }
.increment[data-color="orange"] .increment-header::before { background: var(--py-operator); }
.increment[data-color="param"] .increment-header::before { background: var(--py-param); }
.increment[data-color="decorator"] .increment-header::before { background: var(--py-decorator); }
.increment[data-color="number"] .increment-header::before { background: var(--py-number); }

.increment-chevron {
  font-size: 0.75rem;
  color: var(--text-muted);
  transition: transform 0.3s ease;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.increment.open .increment-chevron { transform: rotate(90deg); }

.increment-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  min-width: 28px;
  text-align: center;
}

.increment[data-color="blue"] .increment-num { background: rgba(86,156,214,0.15); color: var(--py-builtin); }
.increment[data-color="purple"] .increment-num { background: rgba(197,134,192,0.15); color: var(--py-keyword); }
.increment[data-color="green"] .increment-num { background: rgba(106,153,85,0.15); color: var(--py-string); }
.increment[data-color="teal"] .increment-num { background: rgba(78,201,176,0.15); color: var(--py-class); }
.increment[data-color="gold"] .increment-num { background: rgba(220,220,170,0.15); color: var(--py-function); }
.increment[data-color="orange"] .increment-num { background: rgba(206,145,120,0.15); color: var(--py-operator); }
.increment[data-color="param"] .increment-num { background: rgba(156,220,254,0.15); color: var(--py-param); }
.increment[data-color="decorator"] .increment-num { background: rgba(215,186,125,0.15); color: var(--py-decorator); }
.increment[data-color="number"] .increment-num { background: rgba(181,206,168,0.15); color: var(--py-number); }

.increment-title {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 600;
}

.increment-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.increment-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
}

.increment-progress-bar {
  width: 100px;
  height: 4px;
  background: var(--bg-input);
  border-radius: 2px;
  overflow: hidden;
}

.increment-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.increment[data-color="blue"] .increment-progress-fill { background: var(--py-builtin); }
.increment[data-color="purple"] .increment-progress-fill { background: var(--py-keyword); }
.increment[data-color="green"] .increment-progress-fill { background: var(--py-string); }
.increment[data-color="teal"] .increment-progress-fill { background: var(--py-class); }
.increment[data-color="gold"] .increment-progress-fill { background: var(--py-function); }
.increment[data-color="orange"] .increment-progress-fill { background: var(--py-operator); }
.increment[data-color="param"] .increment-progress-fill { background: var(--py-param); }
.increment[data-color="decorator"] .increment-progress-fill { background: var(--py-decorator); }
.increment[data-color="number"] .increment-progress-fill { background: var(--py-number); }

.increment-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  min-width: 36px;
  text-align: right;
}

.increment-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.increment.open .increment-body {
  max-height: 9999px;
}

.ticket-list {
  padding: 4px 12px 12px;
}

/* ── Ticket Card ── */
.ticket {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: start;
  gap: 12px;
  padding: 12px 14px;
  margin: 4px 0;
  border-radius: var(--radius);
  background: var(--bg-card);
  border: 1px solid transparent;
  transition: all var(--transition);
  cursor: default;
}

.ticket:hover {
  background: var(--bg-card-hover);
  border-color: var(--border);
  transform: translateX(2px);
}

.ticket.checked {
  opacity: 0.55;
  background: var(--bg-editor);
}

.ticket.checked:hover { opacity: 0.75; }

.ticket.checked .ticket-title {
  text-decoration: line-through;
  text-decoration-color: var(--text-muted);
}

/* Custom checkbox */
.ticket-checkbox {
  position: relative;
  width: 20px;
  height: 20px;
  margin-top: 1px;
  flex-shrink: 0;
}

.ticket-checkbox input {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  z-index: 2;
}

.ticket-checkbox .checkmark {
  position: absolute;
  top: 0; left: 0;
  width: 20px;
  height: 20px;
  background: var(--bg-input);
  border: 2px solid var(--border-active);
  border-radius: 4px;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.ticket-checkbox input:hover ~ .checkmark {
  border-color: var(--py-builtin);
  background: var(--glow-blue);
}

.ticket-checkbox input:checked ~ .checkmark {
  background: var(--accent-green);
  border-color: var(--accent-green);
}

.ticket-checkbox .checkmark::after {
  content: '';
  display: none;
  width: 5px;
  height: 9px;
  border: solid var(--bg-root);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -2px;
}

.ticket-checkbox input:checked ~ .checkmark::after { display: block; }

.ticket-info { min-width: 0; }

.ticket-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}

.ticket-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--py-decorator);
}

.ticket-title {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  transition: all var(--transition);
}

.ticket-badges {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  margin-top: 1px;
}

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.badge-p0 { background: rgba(248,81,73,0.12); color: var(--accent-red); }
.badge-p1 { background: rgba(210,153,34,0.12); color: var(--accent-yellow); }
.badge-est { background: rgba(156,220,254,0.1); color: var(--py-param); }
.badge-new { background: rgba(78,201,176,0.12); color: var(--py-class); }

.ticket-deps {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.ticket-deps span { color: var(--py-keyword); }

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 32px;
  background: rgba(14, 14, 16, 0.5);
  border-bottom: 1px solid var(--border);
}

.filter-bar label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  padding: 5px 12px;
  background: var(--bg-input);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
}

.filter-btn:hover {
  background: var(--bg-card);
  border-color: var(--border-active);
  color: var(--text-primary);
}

.filter-btn.active {
  background: var(--accent-blue);
  border-color: var(--accent-blue-bright);
  color: #fff;
}

.search-input {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  padding: 6px 12px;
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  outline: none;
  transition: border-color var(--transition);
  margin-left: auto;
  max-width: 260px;
}

.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--accent-blue-bright); }

/* ── Responsive ── */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main-header { padding: 12px 16px; }
  .filter-bar { padding: 8px 16px; flex-wrap: wrap; }
  .content { padding: 16px; }
  .state-machine { display: none; }
}
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Backlog</h1>
      <div class="brand">Trust Copilot Autopilot</div>
    </div>
    <div class="global-progress">
      <div class="global-progress-label">
        <span>Overall</span>
        <span id="globalPct">0%</span>
      </div>
      <div class="global-progress-bar">
        <div class="global-progress-fill" id="globalFill" style="width:0%"></div>
      </div>
      <div class="global-stats">
        <div class="stat-box">
          <div class="stat-value" id="statDone">0</div>
          <div class="stat-label">Done</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="statTotal">69</div>
          <div class="stat-label">Total</div>
        </div>
      </div>
    </div>
    <div class="nav-list" id="navList"></div>
    <div class="sidebar-footer">
      <button onclick="expandAll()">Expand All</button>
      <button onclick="collapseAll()">Collapse All</button>
    </div>
  </aside>

  <main class="main">
    <header class="main-header">
      <h2><span>class</span> SalesEngine <span>(</span>Backlog<span>)</span>:</h2>
      <div class="state-machine">
        <span class="state">raw_signal</span><span class="arrow">&#8594;</span>
        <span class="state">qualified</span><span class="arrow">&#8594;</span>
        <span class="state">contactable</span><span class="arrow">&#8594;</span>
        <span class="state">replied</span><span class="arrow">&#8594;</span>
        <span class="state">paid</span><span class="arrow">&#8594;</span>
        <span class="state">activated</span>
      </div>
    </header>

    <div class="filter-bar">
      <label>Show:</label>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="todo" onclick="setFilter('todo',this)">Todo</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">Done</button>
      <button class="filter-btn" data-filter="p0" onclick="setFilter('p0',this)">P0</button>
      <button class="filter-btn" data-filter="p1" onclick="setFilter('p1',this)">P1</button>
      <input type="text" class="search-input" placeholder="Search tickets..." id="searchInput" oninput="applyFilters()">
    </div>

    <div class="content" id="content"></div>
  </main>
</div>

<script>
const INCREMENTS = [
  {
    num: 1, title: "Foundation & data model", color: "blue",
    tickets: [
      { id:"ARC-001", title:"Split discovery lane from contact lane", p:"P0", est:3, deps:"—" },
      { id:"PLAT-002", title:"Scaffold repo shape and shared contracts", p:"P0", est:5, deps:"ARC-001" },
      { id:"DATA-003", title:"Core schema and deal state machine", p:"P0", est:8, deps:"PLAT-002" },
      { id:"SIE-001", title:"Sales-intelligence data model", p:"P0", est:3, deps:"DATA-003" },
      { id:"SIE-002", title:"Normalized signal contract", p:"P0", est:3, deps:"SIE-001" },

const STORAGE_KEY = "tcp-backlog-v2";
let checked = {};
let currentFilter = "all";

function loadState() {
  try { checked = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { checked = {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
}

function render() {
  const nav = document.getElementById("navList");
  const content = document.getElementById("content");
  nav.innerHTML = "";
  content.innerHTML = "";

  INCREMENTS.forEach(inc => {
    const done = inc.tickets.filter(t => checked[t.id]).length;
    const total = inc.tickets.length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    const isComplete = done === total;

    const navItem = document.createElement("div");
    navItem.className = "nav-item" + (isComplete ? " complete" : "");
    navItem.innerHTML = `
      <span class="nav-num">${inc.num}</span>
      <span class="nav-label">${inc.title}</span>
      <span class="nav-progress">${done}/${total}</span>
      <span class="nav-check">&#10003;</span>
    `;
    navItem.onclick = () => {
      const el = document.getElementById("inc-" + inc.num);
      if (el) {
        el.classList.add("open");
        el.scrollIntoView({ behavior: "smooth", block: "start" });
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        navItem.classList.add("active");
      }
    };
    nav.appendChild(navItem);

    const section = document.createElement("div");
    section.className = "increment open";
    section.id = "inc-" + inc.num;
    section.dataset.color = inc.color;
    if (isComplete) section.classList.add("complete");

    section.innerHTML = `
      <div class="increment-header" onclick="toggleIncrement(this)">
        <span class="increment-chevron">&#9654;</span>
        <span class="increment-num">${inc.num}</span>
        <span class="increment-title">${inc.title}</span>
        <div class="increment-meta">
          <span class="increment-count">${done}/${total}</span>
          <div class="increment-progress-bar">
            <div class="increment-progress-fill" style="width:${pct}%"></div>
          </div>
          <span class="increment-pct" style="color:${pct===100?'var(--accent-green)':'var(--text-secondary)'}">${pct}%</span>
        </div>
      </div>
      <div class="increment-body">
        <div class="ticket-list" id="tickets-${inc.num}"></div>
      </div>
    `;

    content.appendChild(section);

    const ticketList = section.querySelector(".ticket-list");
    inc.tickets.forEach(t => {
      const isChecked = !!checked[t.id];
      const card = document.createElement("div");
      card.className = "ticket" + (isChecked ? " checked" : "");
      card.dataset.id = t.id;
      card.dataset.priority = t.p.toLowerCase();

      let techBadge = t.tech ? `<span class="badge badge-new">${t.tech}</span>` : "";

      card.innerHTML = `
        <label class="ticket-checkbox">
          <input type="checkbox" ${isChecked ? "checked" : ""} onchange="toggleTicket('${t.id}', this)">
          <span class="checkmark"></span>
        </label>
        <div class="ticket-info">
          <div class="ticket-top">
            <span class="ticket-id">${t.id}</span>
            <span class="ticket-title">${t.title}</span>
          </div>
          <div class="ticket-deps">deps: <span>${t.deps}</span></div>
        </div>
        <div class="ticket-badges">
          <span class="badge badge-${t.p.toLowerCase()}">${t.p}</span>
          <span class="badge badge-est">${t.est} pts</span>
          ${techBadge}
        </div>
      `;
      ticketList.appendChild(card);
    });
  });

  updateGlobalStats();
  applyFilters();
}

function toggleTicket(id, el) {
  if (el.checked) checked[id] = true;
  else delete checked[id];
  saveState();

  const card = el.closest(".ticket");
  card.classList.toggle("checked", el.checked);

  const inc = el.closest(".increment");
  updateIncrementProgress(inc);
  updateGlobalStats();
  updateNav();
  applyFilters();
}

function updateIncrementProgress(inc) {
  const tickets = inc.querySelectorAll(".ticket");
  const done = inc.querySelectorAll(".ticket.checked").length;
  const total = tickets.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  inc.querySelector(".increment-count").textContent = `${done}/${total}`;
  inc.querySelector(".increment-progress-fill").style.width = pct + "%";
  const pctEl = inc.querySelector(".increment-pct");
  pctEl.textContent = pct + "%";
  pctEl.style.color = pct === 100 ? "var(--accent-green)" : "var(--text-secondary)";
  inc.classList.toggle("complete", pct === 100);
}

function updateGlobalStats() {
  const total = INCREMENTS.reduce((s, i) => s + i.tickets.length, 0);
  const done = Object.keys(checked).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("globalPct").textContent = pct + "%";
  document.getElementById("globalFill").style.width = pct + "%";
  document.getElementById("statDone").textContent = done;
  document.getElementById("statTotal").textContent = total;
}

function updateNav() {
  const navItems = document.querySelectorAll(".nav-item");
  INCREMENTS.forEach((inc, i) => {
    const done = inc.tickets.filter(t => checked[t.id]).length;
    const total = inc.tickets.length;
    const navItem = navItems[i];
    if (!navItem) return;
    navItem.querySelector(".nav-progress").textContent = `${done}/${total}`;
    navItem.classList.toggle("complete", done === total);
  });
}

function toggleIncrement(header) {
  header.parentElement.classList.toggle("open");
}

function expandAll() {
  document.querySelectorAll(".increment").forEach(el => el.classList.add("open"));
}

function collapseAll() {
  document.querySelectorAll(".increment").forEach(el => el.classList.remove("open"));
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById("searchInput").value || "").toLowerCase();

  document.querySelectorAll(".ticket").forEach(card => {
    const id = card.dataset.id.toLowerCase();
    const title = card.querySelector(".ticket-title").textContent.toLowerCase();
    const priority = card.dataset.priority;
    const isChecked = card.classList.contains("checked");

    let show = true;
    if (currentFilter === "todo") show = !isChecked;
    else if (currentFilter === "done") show = isChecked;
    else if (currentFilter === "p0") show = priority === "p0";
    else if (currentFilter === "p1") show = priority === "p1";

    if (show && search) {
      show = id.includes(search) || title.includes(search);
    }

    card.style.display = show ? "" : "none";
  });

  document.querySelectorAll(".increment").forEach(inc => {
    const visibleTickets = inc.querySelectorAll(".ticket:not([style*='display: none'])");
    const body = inc.querySelector(".increment-body");
    if (visibleTickets.length === 0 && (currentFilter !== "all" || search)) {
      inc.style.display = "none";
    } else {
      inc.style.display = "";
    }
  });
}

function resetAll() {
  if (confirm("Reset all checkboxes? This cannot be undone.")) {
    checked = {};
    saveState();
    render();
  }
}

loadState();
render();
</script>
